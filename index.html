  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.body.innerHTML = '<div style="color:red; background:white; padding:20px; z-index:9999; position:fixed; top:0; left:0; width:100%; height:100%; overflow:auto;"><h1>Błąd JS!</h1><p>' + msg + '</p><pre>' + (error ? error.stack : '') + '</pre></div>';
      return false;
    };
    window.onunhandledrejection = function(event) {
      document.body.innerHTML = '<div style="color:red; background:white; padding:20px; z-index:9999; position:fixed; top:0; left:0; width:100%; height:100%; overflow:auto;"><h1>Nieobsłużony Promise!</h1><p>' + event.reason + '</p><pre>' + (event.reason ? event.reason.stack : '') + '</pre></div>';
    };
  </script>

</head>
